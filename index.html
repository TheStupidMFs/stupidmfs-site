<!DOCTYPE html>
<html>
<head>
  <title>Stupid MFs</title>

  <style>
    body {
      margin: 0;
      background: #ff1a00;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow-x: hidden;
    }

    .nav {
      background: black;
      padding: 15px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav a {
      color: white;
      margin: 0 20px;
      text-decoration: none;
      font-weight: bold;
    }

    .bg-text {
      position: fixed;
      top: 180px;
      left: 0;
      font-size: 110px;
      font-weight: bold;
      color: rgba(0, 0, 0, 0.14);
      white-space: nowrap;
      animation: scrollText 14s linear infinite;
      z-index: 0;
    }

    @keyframes scrollText {
      from { transform: translateX(100%); }
      to { transform: translateX(-100%); }
    }

    .content {
      position: relative;
      z-index: 2;
      padding: 50px 20px;
    }

    .logo {
      width: 420px;
      max-width: 90%;
      filter: drop-shadow(8px 8px 0 black);
    }

    .character {
      width: 260px;
      margin-top: 35px;
      animation: float 2s infinite ease-in-out;
      transition: 0.2s;
      cursor: pointer;
      border: 5px solid black;
      box-shadow: 8px 8px 0 black;
    }

    .character:hover {
      transform: scale(1.06) rotate(-3deg);
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0); }
    }

    #quote {
      display: none;
      max-width: 650px;
      margin: 30px auto;
      background: white;
      color: black;
      border: 5px solid black;
      box-shadow: 8px 8px 0 black;
      padding: 22px;
      font-size: 22px;
      font-weight: bold;
    }

    .menu {
      margin-top: 25px;
    }

    .menu button {
      margin: 12px;
      padding: 18px 34px;
      font-size: 18px;
      font-weight: bold;
      background: white;
      color: black;
      border: 5px solid black;
      box-shadow: 7px 7px 0 black;
      cursor: pointer;
      transition: 0.2s;
    }

    .menu button:hover {
      transform: scale(1.08);
      background: #ffe600;
    }

    .music-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: black;
      color: white;
      border: 3px solid white;
      padding: 12px 18px;
      font-weight: bold;
      cursor: pointer;
      z-index: 20;
    }

    .tagline {
      margin-top: 30px;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 3px 3px black;
    }
  </style>
</head>

<body>

  <div class="nav">
    <a href="index.html">HOME</a>
    <a href="merch.html">MERCH</a>
    <a href="services.html">SERVICES</a>
    <a href="playbook.html">PLAYBOOK</a>
  </div>

  <div class="bg-text">
    MEMECOINS ARE STUPID • NFTS ARE STUPID • YOU ARE STUPID •
  </div>

  <div class="content">
    <img src="LOGO.jfif" class="logo">

    <br>

    <img src="FOOLY.jpg" class="character" onclick="showQuote()">

    <div id="quote"></div>

    <div class="menu">
      <button onclick="window.open('https://www.launchmynft.io/collections/3vEb4ECM4tqfG1CLrdXqgA56KA4UcuWx9mw7puiWWQKG/D1zHHouXrOc20aJzPZg1')">
        MINT A STUPID MF
      </button>

      <button onclick="showQuote()">
        TALK TO FOOLY
      </button>

      <button onclick="window.open('https://x.com/TheStupidMFs')">
        JOIN THE MOVEMENT
      </button>

      <button onclick="toggleMusic()">
        MUSIC ON / OFF
      </button>
    </div>

    <p class="tagline">Be stupid and prosper.</p>
  </div>

  <button class="music-btn" onclick="toggleMusic()">MUSIC: OFF</button>

  <audio id="music" loop>
    <source src="bagspacked.mp3" type="audio/mpeg">
  </audio>

  <script>
    const quotes = [
      "They said memecoins were stupid. We agreed and built anyway.",
      "Welcome to the clubhouse. Please leave your common sense outside.",
      "2,222 Stupid MFs. Infinite bad decisions.",
      "Be stupid and prosper.",
      "This is not a project. This is a beautifully organized bad idea.",
      "The NFT is not just a PFP. It is your badge into the chaos.",
      "Stupid Gaming loading...",
      "NFT Reppers are reporting for duty."
    ];

    function showQuote() {
      const box = document.getElementById("quote");
      const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
      box.innerText = randomQuote;
      box.style.display = "block";
    }

    function toggleMusic() {
      const music = document.getElementById("music");
      const btn = document.querySelector(".music-btn");

      if (music.paused) {
        music.volume = 0.45;
        music.play();
        btn.innerText = "MUSIC: ON";
      } else {
        music.pause();
        btn.innerText = "MUSIC: OFF";
      }
    }
  </script>

</body>
</html>
